<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="430" fill="none"/>
  <text x="380" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#0d7d7d">16S vs Shotgun Sequencing</text>

  <!-- 16S column -->
  <rect x="30" y="60" width="330" height="330" rx="12" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
  <text x="195" y="92" text-anchor="middle" font-size="18" font-weight="bold" fill="#095a5a">16S rRNA amplicon</text>
  <text x="195" y="116" text-anchor="middle" font-size="13" fill="#333">Reads ONE marker gene region</text>

  <rect x="60" y="135" width="270" height="40" rx="6" fill="#ffffff" stroke="#2aa6a6"/>
  <text x="195" y="160" text-anchor="middle" font-size="13" fill="#222">Bacteria &amp; archaea only</text>
  <rect x="60" y="183" width="270" height="40" rx="6" fill="#ffffff" stroke="#2aa6a6"/>
  <text x="195" y="208" text-anchor="middle" font-size="13" fill="#222">Often genus-level resolution</text>
  <rect x="60" y="231" width="270" height="40" rx="6" fill="#ffffff" stroke="#2aa6a6"/>
  <text x="195" y="256" text-anchor="middle" font-size="13" fill="#222">No functional information</text>
  <rect x="60" y="279" width="270" height="40" rx="6" fill="#ffffff" stroke="#2aa6a6"/>
  <text x="195" y="304" text-anchor="middle" font-size="13" fill="#222">Lower cost · PCR primer bias</text>

  <text x="195" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#095a5a">Best for: broad, low-cost survey</text>
  <text x="195" y="372" text-anchor="middle" font-size="11" fill="#555">"Who is roughly here?"</text>

  <!-- Shotgun column -->
  <rect x="400" y="60" width="330" height="330" rx="12" fill="#d7eeee" stroke="#0d7d7d" stroke-width="2"/>
  <text x="565" y="92" text-anchor="middle" font-size="18" font-weight="bold" fill="#095a5a">Shotgun metagenomics</text>
  <text x="565" y="116" text-anchor="middle" font-size="13" fill="#333">Reads ALL DNA in the sample</text>

  <rect x="430" y="135" width="270" height="40" rx="6" fill="#ffffff" stroke="#0d7d7d"/>
  <text x="565" y="160" text-anchor="middle" font-size="13" fill="#222">Bacteria, archaea, viruses, fungi</text>
  <rect x="430" y="183" width="270" height="40" rx="6" fill="#ffffff" stroke="#0d7d7d"/>
  <text x="565" y="208" text-anchor="middle" font-size="13" fill="#222">Species &amp; strain-level resolution</text>
  <rect x="430" y="231" width="270" height="40" rx="6" fill="#ffffff" stroke="#0d7d7d"/>
  <text x="565" y="256" text-anchor="middle" font-size="13" fill="#222">Functional / pathway data</text>
  <rect x="430" y="279" width="270" height="40" rx="6" fill="#ffffff" stroke="#0d7d7d"/>
  <text x="565" y="304" text-anchor="middle" font-size="13" fill="#222">Higher cost · more compute</text>

  <text x="565" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#095a5a">Best for: depth + function</text>
  <text x="565" y="372" text-anchor="middle" font-size="11" fill="#555">"Who is here AND what can they do?"</text>

  <text x="380" y="418" text-anchor="middle" font-size="11" fill="#777">Right method depends on the question. See the 16S vs Shotgun page for cited detail.</text>
</svg>
