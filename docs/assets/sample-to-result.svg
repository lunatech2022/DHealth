<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" font-family="Helvetica, Arial, sans-serif">
  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d7d7d">From Sample to Result</text>
  <g font-size="12" fill="#222">
    <!-- steps -->
    <g>
      <rect x="20" y="70" width="120" height="70" rx="10" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
      <text x="80" y="100" text-anchor="middle" font-weight="bold" fill="#095a5a">1. Collect</text>
      <text x="80" y="120" text-anchor="middle">stool / blood /</text>
      <text x="80" y="134" text-anchor="middle">saliva sample</text>
    </g>
    <g>
      <rect x="170" y="70" width="120" height="70" rx="10" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
      <text x="230" y="100" text-anchor="middle" font-weight="bold" fill="#095a5a">2. Extract</text>
      <text x="230" y="120" text-anchor="middle">isolate DNA</text>
      <text x="230" y="134" text-anchor="middle">from the sample</text>
    </g>
    <g>
      <rect x="320" y="70" width="120" height="70" rx="10" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
      <text x="380" y="100" text-anchor="middle" font-weight="bold" fill="#095a5a">3. Library prep</text>
      <text x="380" y="120" text-anchor="middle">prepare DNA</text>
      <text x="380" y="134" text-anchor="middle">for sequencing</text>
    </g>
    <g>
      <rect x="470" y="70" width="120" height="70" rx="10" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
      <text x="530" y="100" text-anchor="middle" font-weight="bold" fill="#095a5a">4. Sequence</text>
      <text x="530" y="120" text-anchor="middle">read the DNA</text>
      <text x="530" y="134" text-anchor="middle">(NGS)</text>
    </g>
    <g>
      <rect x="620" y="70" width="120" height="70" rx="10" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
      <text x="680" y="100" text-anchor="middle" font-weight="bold" fill="#095a5a">5. Analyse</text>
      <text x="680" y="120" text-anchor="middle">bioinformatics</text>
      <text x="680" y="134" text-anchor="middle">pipeline</text>
    </g>
    <g>
      <rect x="755" y="78" width="55" height="54" rx="10" fill="#0d7d7d"/>
      <text x="782" y="100" text-anchor="middle" font-weight="bold" fill="#fff" font-size="11">6.</text>
      <text x="782" y="116" text-anchor="middle" fill="#fff" font-size="11">Report</text>
    </g>
  </g>
  <!-- arrows -->
  <g stroke="#2aa6a6" stroke-width="3" fill="none" marker-end="url(#a)">
    <line x1="142" y1="105" x2="168" y2="105"/>
    <line x1="292" y1="105" x2="318" y2="105"/>
    <line x1="442" y1="105" x2="468" y2="105"/>
    <line x1="592" y1="105" x2="618" y2="105"/>
    <line x1="742" y1="105" x2="753" y2="105"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2aa6a6"/>
    </marker>
  </defs>
  <text x="410" y="185" text-anchor="middle" font-size="11" fill="#777">Quality at every step determines whether the final result is trustworthy.</text>
</svg>
