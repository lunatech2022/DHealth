<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Helvetica, Arial, sans-serif">
  <text x="380" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d7d7d">How Gut Microbes Influence Health</text>

  <!-- source -->
  <rect x="30" y="110" width="150" height="80" rx="12" fill="#0d7d7d"/>
  <text x="105" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Gut microbes</text>
  <text x="105" y="166" text-anchor="middle" font-size="11" fill="#cdeaea">ferment dietary fibre</text>

  <!-- metabolites -->
  <rect x="240" y="110" width="170" height="80" rx="12" fill="#e6f4f4" stroke="#0d7d7d" stroke-width="2"/>
  <text x="325" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#095a5a">Metabolites</text>
  <text x="325" y="160" text-anchor="middle" font-size="11" fill="#333">SCFAs, vitamins,</text>
  <text x="325" y="174" text-anchor="middle" font-size="11" fill="#333">neurochemicals</text>

  <!-- outcomes -->
  <g font-size="11" fill="#222">
    <rect x="480" y="40" width="250" height="42" rx="8" fill="#ffffff" stroke="#2aa6a6"/>
    <text x="605" y="66" text-anchor="middle">Gut-barrier integrity</text>
    <rect x="480" y="92" width="250" height="42" rx="8" fill="#ffffff" stroke="#2aa6a6"/>
    <text x="605" y="118" text-anchor="middle">Immune regulation</text>
    <rect x="480" y="144" width="250" height="42" rx="8" fill="#ffffff" stroke="#2aa6a6"/>
    <text x="605" y="170" text-anchor="middle">Metabolic health (weight, glucose)</text>
    <rect x="480" y="196" width="250" height="42" rx="8" fill="#ffffff" stroke="#2aa6a6"/>
    <text x="605" y="222" text-anchor="middle">Gut–brain axis &amp; gene regulation</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2aa6a6"/>
    </marker>
  </defs>
  <g stroke="#2aa6a6" stroke-width="3" fill="none" marker-end="url(#b)">
    <line x1="182" y1="150" x2="236" y2="150"/>
    <line x1="412" y1="150" x2="476" y2="61"/>
    <line x1="412" y1="150" x2="476" y2="113"/>
    <line x1="412" y1="150" x2="476" y2="165"/>
    <line x1="412" y1="150" x2="476" y2="217"/>
  </g>
  <text x="380" y="280" text-anchor="middle" font-size="11" fill="#777">A balanced community supports health; disruption (dysbiosis) is linked to disease. See cited pages.</text>
</svg>
